# staticcheck.conf — project-wide staticcheck configuration
# See: https://staticcheck.dev/docs/configuration/
#
# Enabled check families:
#   SA  — correctness issues (bugs, API misuse, suspicious code) — ALL ON
#   U   — unused code                                             — ALL ON
#   S   — simplifications                                         — ALL ON
#   QF  — quick fixes                                             — ALL ON
#   ST  — style (package comments, naming conventions)           — OFF (cosmetic)
#
# Specific suppressions:
#   SA1019 — deprecated API: Playwright .Type() called in automation package.
#             .Type() and .Fill() are functionally identical for our use case.
#
checks = ["all", "-ST1000", "-ST1003", "-ST1020", "-ST1021", "-SA1019"]
