# ============================================================================
# Reach — Docker Compose for Coolify
# ============================================================================
# Coolify auto-detects this file and deploys all services.
#
# Coolify auto-generates these variables (no manual config needed):
#   SERVICE_URL_APP             → https://reach.gour.io (from domain field)
#   SERVICE_FQDN_APP            → reach.gour.io
#   SERVICE_PASSWORD_POSTGRES   → random DB password
#   SERVICE_PASSWORD_64_JWT     → random 64-char JWT secret
#
# The ONLY thing you set in Coolify is the domain (reach.gour.io).
# Everything else is automatic.
# ============================================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: reach
      POSTGRES_USER: reach
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reach -d reach"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Reach App (Go backend + Vue frontend) ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "4000"
      DATABASE_URL: postgresql://reach:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/reach?sslmode=disable
      JWT_SECRET: ${SERVICE_PASSWORD_64_JWT}
      ACCOUNTS_URL: https://accounts.gour.io
      APP_URL: ${SERVICE_URL_APP:-https://reach.gour.io}
      FRONTEND_URL: ${SERVICE_URL_APP:-https://reach.gour.io}
      SESSION_COOKIE: reach-session
      SESSION_MAX_AGE: "2592000"
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: Lax
      SPA_DIR: /app/public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
